<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration | Attendance System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
      }
      body {
        background: linear-gradient(135deg, #0b7b3e, #0b7b3e, #0b7b3e);
        min-height: 100vh;
        padding: 40px 20px;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
      }
      .card {
        background: white;
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        margin-bottom: 25px;
      }
      .card-header {
        background: linear-gradient(135deg, #0f2027, #203a43);
        color: white;
        padding: 30px;
        text-align: center;
      }
      .card-header h1 {
        font-size: 1.8rem;
        margin-bottom: 8px;
      }
      .card-body {
        padding: 30px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        font-weight: 600;
        display: block;
        margin-bottom: 8px;
        color: #2c5364;
      }
      input,
      select {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 16px;
        font-size: 1rem;
        transition: 0.2s;
        outline: none;
      }
      input:focus,
      select:focus {
        border-color: #2c5364;
        box-shadow: 0 0 0 3px rgba(44, 83, 100, 0.1);
      }
      .btn {
        border: none;
        padding: 14px 28px;
        border-radius: 40px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
        width: 100%;
      }
      .btn-primary {
        background: linear-gradient(135deg, #0f2027, #203a43);
        color: white;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
      }
      .btn-success {
        background: #2ecc71;
        color: white;
      }
      .qr-section {
        background: #f0f4f8;
        border-radius: 24px;
        padding: 25px;
        text-align: center;
        margin-top: 25px;
      }
      #qrcodeCanvas {
        display: flex;
        justify-content: center;
        margin: 20px 0;
      }
      .student-list {
        max-height: 300px;
        overflow-y: auto;
        margin-top: 20px;
      }
      .student-item {
        background: #f0f4f8;
        border-radius: 16px;
        padding: 12px 15px;
        margin-bottom: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: pointer;
      }
      .student-item:hover {
        background: #d5e6f2;
      }
      .student-item.selected {
        background: #a8d5e8;
        border-left: 4px solid #2c5364;
      }
      .delete-btn {
        background: #e74c3c;
        border: none;
        padding: 5px 12px;
        border-radius: 20px;
        color: white;
        cursor: pointer;
      }
      .toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #333;
        color: white;
        padding: 12px 24px;
        border-radius: 40px;
        opacity: 0;
        transition: 0.3s;
        z-index: 1000;
      }
      .stats {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        padding: 15px;
        background: #f0f4f8;
        border-radius: 20px;
      }
      hr {
        margin: 20px 0;
      }
      .config-warning {
        background: #fef5e7;
        border-left: 4px solid #f39c12;
        padding: 12px;
        margin-bottom: 15px;
        border-radius: 12px;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="card-header">
          <img src="img/LogoSIS-white.png" width="10%" />
          <h1><i class="fas fa-user-graduate"></i> Student Registration</h1>
        </div>
        <div class="card-body">
          <div class="config-warning" id="configWarning">
            <i class="fas fa-exclamation-triangle"></i> Configure Google Script
            URL in JavaScript
          </div>

          <div class="stats">
            <span
              ><i class="fas fa-users"></i> Total Students:
              <strong id="totalStudents">0</strong></span
            >
            <span
              ><i class="fas fa-cloud-upload-alt"></i>
              <span id="syncStatus">Ready</span></span
            >
          </div>

          <div class="form-group">
            <label><i class="fas fa-id-card"></i> Student ID *</label>
            <input type="text" id="studentId" placeholder="e.g., SIS-0001" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-user"></i> Full Name *</label>
            <input type="text" id="studentName" placeholder="e.g., John Doe" />
          </div>
          <div class="form-group">
            <label><i class="fas fa-layer-group"></i> Grade *</label>
            <select id="studentGrade">
              <option>KG</option>
              <option>Grade 1</option>
              <option>Grade 2</option>
              <option>Grade 3</option>
              <option>Grade 4</option>
              <option>Grade 5</option>
              <option>Grade 6</option>
              <option>Grade 7</option>
              <option>Grade 8</option>
              <option>Grade 9</option>
              <option>Grade 10</option>
              <option>Grade 11</option>
              <option>Grade 12</option>
            </select>
          </div>
          <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email *</label>
            <input
              type="email"
              id="studentEmail"
              placeholder="student@school.com"
            />
          </div>
          <div class="form-group">
            <label><i class="fas fa-phone"></i> Phone</label>
            <input type="text" id="studentPhone" placeholder="+1234567890" />
          </div>

          <button id="registerBtn" class="btn btn-primary">
            <i class="fas fa-save"></i> Register Student
          </button>

          <hr />

          <h3><i class="fas fa-list"></i> Registered Students</h3>
          <div id="studentList" class="student-list"></div>

          <div class="qr-section">
            <h4><i class="fas fa-qrcode"></i> Generate QR Code</h4>
            <p style="font-size: 0.85rem; margin: 10px 0">
              Select a student above, then click generate
            </p>
            <div id="qrcodeCanvas"></div>
            <button id="generateQrBtn" class="btn btn-success">
              <i class="fas fa-sync-alt"></i> Generate QR
            </button>
            <button
              id="downloadQrBtn"
              class="btn btn-primary"
              style="margin-top: 10px; background: #3498db"
            >
              <i class="fas fa-download"></i> Download QR
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
      const GOOGLE_SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbwCsEiq1G-cGarwREXloibMjQ066rWKJaNuWDgJ4OHsN0dxvBbyc_7gqB43o1ONSwpjjg/exec";
      let students = [];
      let selectedStudentId = null;

      function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.style.backgroundColor = isError ? "#e74c3c" : "#2ecc71";
        toast.style.opacity = "1";
        setTimeout(() => (toast.style.opacity = "0"), 2500);
      }

      function saveToLocal() {
        localStorage.setItem("attendance_students", JSON.stringify(students));
      }

      function loadStudents() {
        const stored = localStorage.getItem("attendance_students");
        students = stored ? JSON.parse(stored) : [];
        renderStudentList();
        document.getElementById("totalStudents").innerText = students.length;
      }

      function renderStudentList() {
        const container = document.getElementById("studentList");
        if (students.length === 0) {
          container.innerHTML =
            '<div style="text-align:center; color:#999;">No students registered yet</div>';
          return;
        }
        container.innerHTML = students
          .map(
            (s) => `
            <div class="student-item ${selectedStudentId === s.id ? "selected" : ""}" data-id="${s.id}">
                <div><strong>${escapeHtml(s.name)}</strong><br><small>${s.id} | ${s.grade}</small></div>
                <button class="delete-btn" data-id="${s.id}"><i class="fas fa-trash"></i></button>
            </div>
        `,
          )
          .join("");

        document.querySelectorAll(".student-item").forEach((el) => {
          const sid = el.getAttribute("data-id");
          el.addEventListener("click", (e) => {
            if (e.target.closest(".delete-btn")) return;
            selectedStudentId = sid;
            renderStudentList();
            showToast(`Selected: ${students.find((s) => s.id === sid)?.name}`);
          });
          const delBtn = el.querySelector(".delete-btn");
          if (delBtn)
            delBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              deleteStudent(sid);
            });
        });
      }

      function deleteStudent(id) {
        students = students.filter((s) => s.id !== id);
        if (selectedStudentId === id) selectedStudentId = null;
        saveToLocal();
        renderStudentList();
        document.getElementById("totalStudents").innerText = students.length;
        document.getElementById("qrcodeCanvas").innerHTML = "";
        showToast("Student deleted");
      }

      async function registerToGoogleSheet() {
        const id = document.getElementById("studentId").value.trim();
        const name = document.getElementById("studentName").value.trim();
        const grade = document.getElementById("studentGrade").value;
        const email = document.getElementById("studentEmail").value.trim();
        const phone = document.getElementById("studentPhone").value.trim();

        if (!id || !name || !email) {
          showToast("Please fill ID, Name, and Email", true);
          return;
        }
        if (!email.includes("@")) {
          showToast("Valid email required", true);
          return;
        }

        const studentData = { id, name, grade, email, phone: phone || "—" };

        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "register",
              studentId: id,
              studentName: name,
              grade: grade,
              email: email,
              phone: phone || "—",
            }),
          });

          const existing = students.findIndex((s) => s.id === id);
          if (existing !== -1) students[existing] = studentData;
          else students.push(studentData);

          saveToLocal();
          renderStudentList();
          document.getElementById("totalStudents").innerText = students.length;
          document.getElementById("studentId").value = "";
          document.getElementById("studentName").value = "";
          document.getElementById("studentEmail").value = "";
          document.getElementById("studentPhone").value = "";
          showToast(`Registered ${name}`);
        } catch (error) {
          showToast("Failed to sync", true);
        }
      }

      function generateQR() {
        if (!selectedStudentId) {
          showToast("Select a student first", true);
          return;
        }
        const student = students.find((s) => s.id === selectedStudentId);
        if (!student) return;

        const payload = JSON.stringify({
          type: "attendance",
          studentId: student.id,
          name: student.name,
          grade: student.grade,
          email: student.email,
          phone: student.phone,
        });
        const container = document.getElementById("qrcodeCanvas");
        container.innerHTML = "";
        new QRCode(container, {
          text: payload,
          width: 200,
          height: 200,
          colorDark: "#0f2027",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M,
        });
        showToast(`QR generated for ${student.name}`);
      }

      function downloadQR() {
        const canvas = document.querySelector("#qrcodeCanvas canvas");
        if (!canvas) {
          showToast("Generate QR first", true);
          return;
        }
        const student = students.find((s) => s.id === selectedStudentId);
        const link = document.createElement("a");
        link.download = `QR_${student?.id || "student"}.png`;
        link.href = canvas.toDataURL();
        link.click();
        showToast("QR Downloaded");
      }

      function escapeHtml(str) {
        if (!str) return "";
        return str.replace(
          /[&<>]/g,
          (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" })[m],
        );
      }

      if (GOOGLE_SCRIPT_URL.includes("YOUR_SCRIPT_ID"))
        document.getElementById("configWarning").style.display = "block";
      else document.getElementById("configWarning").style.display = "none";

      document
        .getElementById("registerBtn")
        .addEventListener("click", registerToGoogleSheet);
      document
        .getElementById("generateQrBtn")
        .addEventListener("click", generateQR);
      document
        .getElementById("downloadQrBtn")
        .addEventListener("click", downloadQR);
      loadStudents();
    </script>
  </body>
</html>
